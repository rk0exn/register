# PR Auto-Labeling Workflow
# Automatically labels PRs based on which domain files were added, modified, or deleted.
#
# Prerequisites: The following labels must exist in the repository:
#   - register    (for new domain registrations)
#   - update      (for domain record updates)
#   - delete      (for domain removals)
#   - non-domain  (for changes outside domains/)
#
# To create them via GitHub CLI:
#   gh label create register   --color "0E8A16" --description "New domain registration"
#   gh label create update     --color "1D76DB" --description "Domain record update"
#   gh label create delete     --color "D93F0B" --description "Domain removal"
#   gh label create non-domain --color "FBCA04" --description "Non-domain file changes"

name: Label PR

on:
  pull_request_target:
    branches: [main]
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    name: Auto-label PR
    runs-on: ubuntu-latest

    steps:
      - name: Detect and apply labels
        uses: actions/github-script@v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100,
            });

            const domainFilter = f => f.filename.startsWith('domains/') && f.filename.endsWith('.json') && !f.filename.endsWith('schema.json');
            const added = files.filter(f => f.status === 'added' && domainFilter(f));
            const modified = files.filter(f => (f.status === 'modified' || f.status === 'renamed') && domainFilter(f));
            const deleted = files.filter(f => f.status === 'removed' && domainFilter(f));
            const nonDomain = files.filter(f => !f.filename.startsWith('domains/'));

            const labels = [];
            if (added.length > 0) labels.push('register');
            if (modified.length > 0) labels.push('update');
            if (deleted.length > 0) labels.push('delete');
            if (nonDomain.length > 0) labels.push('non-domain');

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels,
              });
              console.log(`Applied labels: ${labels.join(', ')}`);
            } else {
              console.log('No domain files changed, no labels to apply');
            }
