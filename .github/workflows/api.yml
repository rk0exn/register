name: Deploy Site & API

on:
  push:
    branches: [main]
    paths:
      - "domains/**"
      - "web/**"

  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    name: Generate and publish API
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Prepare publish directory
        run: |
          mkdir -p publish/api
          node scripts/generate-api.js
          cp api/* publish/api/
          cp -r web/* publish/

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./publish
          destination_dir: ./
          keep_files: false
          commit_message: "Update site and API data"
